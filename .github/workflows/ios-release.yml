name: iOS Release Build

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g., 1.0.5)'
        required: true
        type: string
      build_number:
        description: 'Build number (integer, e.g., 5)'
        required: true
        type: string
  push:
    tags:
      - 'v*.*.*'

env:
  DOTNET_VERSION: '9.0.x'
  PROJECT_PATH: 'SpiritualGiftsSurvey.csproj'
  CONFIGURATION: 'Release'
  BUNDLE_ID: 'com.launchpaddevs.spiritualgiftssurvey'

jobs:
  build-ios:
    runs-on: macos-14
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Install .NET MAUI workload
      run: dotnet workload install maui

    - name: Restore dependencies
      run: dotnet restore ${{ env.PROJECT_PATH }}

    - name: Run unit tests
      run: dotnet test SpiritualGiftsSurvey.Tests/SpiritualGiftsSurvey.Tests.csproj --configuration Release --logger trx --collect:"XPlat Code Coverage"

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-ios
        path: '**/TestResults/**'
        retention-days: 30

    - name: Extract version from input or tag
      id: version
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          VERSION_NAME="${{ inputs.version_name }}"
          BUILD_NUMBER="${{ inputs.build_number }}"
        else
          VERSION_NAME="${GITHUB_REF#refs/tags/v}"
          BUILD_NUMBER="${{ github.run_number }}"
        fi
        echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
        echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT

    - name: Update iOS version in Info.plist
      run: |
        /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.version.outputs.version_name }}" Platforms/iOS/Info.plist
        /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ steps.version.outputs.build_number }}" Platforms/iOS/Info.plist

    - name: Import Code-Signing Certificates
      uses: apple-actions/import-codesign-certs@v2
      with:
        p12-file-base64: ${{ secrets.IOS_DISTRIBUTION_CERT_P12_BASE64 }}
        p12-password: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}

    - name: Download Provisioning Profile
      run: |
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        echo "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
        
        # Extract UUID from provisioning profile
        PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin <<< $(security cms -D -i ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision))
        echo "Provisioning Profile UUID: $PROFILE_UUID"
        
        # Rename with UUID for Xcode to find it
        mv ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision

    - name: Build iOS IPA
      run: |
        dotnet publish ${{ env.PROJECT_PATH }} \
          -f net9.0-ios \
          -c ${{ env.CONFIGURATION }} \
          -p:ArchiveOnBuild=true \
          -p:RuntimeIdentifier=ios-arm64 \
          -p:CodesignKey="${{ secrets.IOS_CODESIGN_KEY_NAME }}" \
          -p:CodesignProvision="${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}" \
          -p:ApplicationDisplayVersion=${{ steps.version.outputs.version_name }} \
          -p:ApplicationVersion=${{ steps.version.outputs.build_number }}

    - name: Find IPA file
      id: find_ipa
      run: |
        IPA_PATH=$(find bin/${{ env.CONFIGURATION }}/net9.0-ios/ios-arm64/publish -name "*.ipa" | head -n 1)
        echo "ipa_path=$IPA_PATH" >> $GITHUB_OUTPUT
        echo "Found IPA: $IPA_PATH"

    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: ios-ipa-${{ steps.version.outputs.version_name }}
        path: ${{ steps.find_ipa.outputs.ipa_path }}
        retention-days: 30

    - name: Upload to TestFlight (Optional)
      if: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID != '' }}
      run: |
        # Install xcrun altool or use App Store Connect API
        xcrun altool --upload-app \
          --type ios \
          --file ${{ steps.find_ipa.outputs.ipa_path }} \
          --apiKey ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }} \
          --apiIssuer ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}

    - name: Create Release
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: ${{ steps.find_ipa.outputs.ipa_path }}
        draft: true
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
